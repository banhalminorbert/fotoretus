<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>VIPACH PhotoStudio 4.6</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Playfair+Display:wght@700&family=Bebas+Neue&family=Pacifico&family=Oswald:wght@600&family=Montserrat:wght@600;700&family=Josefin+Sans:wght@600&family=Nunito:wght@700;800&family=Lora:ital,wght@0,700;1,600&family=Cinzel:wght@700&family=Lobster&family=Abril+Fatface&family=Rock+Salt&family=Permanent+Marker&family=Righteous&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f4f4f6;--surf:#ffffff;--card:#ffffff;--card2:#f0f0f3;--card3:#e2e2e7;
  --sep:rgba(0,0,0,.08);--text:#0d0d0d;
  --text2:rgba(10,10,10,.60);--text3:rgba(10,10,10,.36);
  --accent:#E31937;--acl:rgba(227,25,55,.10);
  --gold:#c9a227;--gol:rgba(201,162,39,.08);
  --red:#d93025;--green:#1e8e3e;--hdr:52px;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',system-ui,sans-serif;font-size:13px}
body{display:flex;flex-direction:column;overflow:hidden}

/* ── HEADER ── */
.hdr{background:var(--surf);border-bottom:1px solid var(--sep);padding:0 14px;height:var(--hdr);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:8px;z-index:10}
.logo{display:flex;align-items:center;gap:7px;flex-shrink:0}
.logo-text{font-size:14px;font-weight:700;letter-spacing:.01em;color:var(--text)}
.logo-badge{font-size:9px;font-weight:700;letter-spacing:.04em;background:var(--accent);color:#fff;border-radius:4px;padding:1px 5px;align-self:flex-start;margin-top:2px}
.hdr-right{display:flex;gap:6px;align-items:center;flex-shrink:0}

/* ── LANGUAGE SELECTOR ── */
.lang-sel{display:flex;gap:2px;background:var(--card);border:1px solid var(--sep);border-radius:9px;padding:2px;flex-shrink:0}
.lang-btn{background:none;border:none;border-radius:7px;font-size:15px;width:30px;height:26px;cursor:pointer;transition:background .15s;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent}
.lang-btn.active{background:var(--accent)}

/* ── BUTTONS ── */
.btn{padding:7px 12px;border-radius:9px;border:none;cursor:pointer;font-size:12px;font-weight:600;transition:all .15s;display:inline-flex;align-items:center;gap:5px;white-space:nowrap;user-select:none;-webkit-tap-highlight-color:transparent;letter-spacing:.01em}
.btn-pri{background:var(--accent);color:#fff}
.btn-pri:hover{opacity:.85}
.btn-sec{background:transparent;color:var(--text2);border:1px solid var(--sep)}
.btn-sec:hover{border-color:var(--accent);color:var(--text);background:var(--acl)}
.btn-red{background:var(--red);color:#fff}
.btn:disabled{opacity:.3;cursor:not-allowed}

/* ── LAYOUT ── */
.app{display:flex;flex:1;overflow:hidden;min-height:0}

/* ── SIDEBAR ── */
.sidebar{width:272px;background:var(--surf);border-right:1px solid var(--sep);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden}
.sidebar-tabs{display:flex;border-bottom:1px solid var(--sep);flex-shrink:0;overflow-x:auto;scrollbar-width:none}
.sidebar-tabs::-webkit-scrollbar{display:none}
.stab{flex:1;min-width:0;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 4px 8px;background:none;border:none;border-bottom:2px solid transparent;color:var(--text3);font-size:10px;font-weight:600;cursor:pointer;white-space:nowrap;transition:all .15s;-webkit-tap-highlight-color:transparent;letter-spacing:.03em}
.stab .stab-ico{height:20px;width:20px;display:flex;align-items:center;justify-content:center}
.stab.active{color:var(--accent);border-bottom-color:var(--accent)}
.sidebar-content{flex:1;overflow-y:auto;overflow-x:hidden;padding:10px 8px;display:flex;flex-direction:column;gap:8px}
.sidebar-content::-webkit-scrollbar{width:2px}
.sidebar-content::-webkit-scrollbar-thumb{background:var(--sep);border-radius:2px}

/* ── CANVAS AREA ── */
.carea{flex:1;display:flex;align-items:center;justify-content:center;background:var(--bg);background-image:radial-gradient(ellipse at 50% 40%,rgba(227,25,55,.06) 0%,transparent 60%);overflow:hidden;position:relative;min-width:0}

/* ── MOBILE ── */
.mobile-tab-bar{display:none}
.mobile-panel{display:none}

/* ── SECTIONS ── */
.sec{background:var(--card);border-radius:8px;padding:12px 11px;border:1px solid var(--sep)}
.stitle{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--text3);margin-bottom:9px;display:flex;align-items:center;justify-content:space-between;padding-left:8px;border-left:2px solid var(--accent)}

/* ── UPLOAD ZONE ── */
.upzone{border:1.5px dashed var(--sep);border-radius:12px;padding:22px 12px;text-align:center;cursor:pointer;transition:all .2s;background:var(--card)}
.upzone:hover,.upzone.over{border-color:var(--accent);background:var(--acl)}
.upzone-ico{font-size:30px;margin-bottom:8px}
.upzone p{color:var(--text2);line-height:1.6;font-size:12px}
.upzone input{display:none}
.imginfo{background:var(--card);border-radius:12px;padding:9px;display:none;border:1px solid var(--sep)}
.imginfo.vis{display:block}
.imgthumb{width:100%;height:80px;border-radius:8px;overflow:hidden;background:#e5e5ea;display:flex;align-items:center;justify-content:center;margin-bottom:7px}
.imgthumb img{max-width:100%;max-height:100%;object-fit:contain}
.imeta{color:var(--text3);font-size:10px;margin-bottom:6px}

/* ── ASPECT RATIO ── */
.argrid{display:grid;grid-template-columns:repeat(4,1fr);gap:4px}
.arbtn{background:var(--card2);border:1px solid var(--sep);border-radius:7px;color:var(--text3);cursor:pointer;padding:6px 2px;font-size:9px;font-weight:600;text-align:center;transition:all .14s;display:flex;flex-direction:column;align-items:center;gap:3px;-webkit-tap-highlight-color:transparent}
.arbtn:hover{border-color:var(--accent);color:var(--text)}
.arbtn.active{border-color:var(--accent);background:var(--acl);color:var(--accent)}

/* ── PRESET SCROLL ── */
.pscroll{display:flex;gap:7px;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch}
.pscroll::-webkit-scrollbar{height:2px}
.pscroll::-webkit-scrollbar-thumb{background:var(--sep);border-radius:2px}
.pbtn{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;background:none;border:none;color:var(--text3);font-size:9px;font-weight:600;transition:color .14s;-webkit-tap-highlight-color:transparent}
.pthumb{width:46px;height:46px;border-radius:9px;background:var(--card2);border:2px solid transparent;overflow:hidden;transition:border-color .14s;position:relative}
.pthumb canvas{position:absolute;top:0;left:0;width:100%;height:100%}
.pbtn.active .pthumb{border-color:var(--accent);background:var(--acl)}
.pbtn.active{color:var(--accent)}

/* ── SLIDERS ── */
.srow{display:flex;align-items:center;gap:6px;margin-bottom:7px;width:100%}
.slbl{width:72px;font-size:10px;color:var(--text2);flex-shrink:0;white-space:nowrap}
.sinput{flex:1;min-width:0;-webkit-appearance:none;height:3px;border-radius:2px;background:var(--card3);outline:none;cursor:pointer}
.sinput::-webkit-slider-thumb{-webkit-appearance:none;width:15px;height:15px;border-radius:50%;background:var(--accent);cursor:pointer;transition:transform .1s;box-shadow:0 0 6px rgba(227,25,55,.4)}
.sinput::-webkit-slider-thumb:active{transform:scale(1.25)}
.sval{width:38px;flex-shrink:0;text-align:right;font-size:10px;color:var(--text2);font-variant-numeric:tabular-nums}
.reset-row{display:flex;justify-content:flex-end;margin-top:3px}
.resetlnk{background:none;border:none;color:var(--text3);font-size:11px;cursor:pointer;padding:2px 0}
.resetlnk:hover{color:var(--accent)}

/* ── STRENGTH ── */
.strength-wrap{background:var(--card2);border-radius:9px;padding:8px 9px;border:1px solid var(--sep)}
.strength-note{font-size:9px;color:var(--text3);margin-top:3px}

/* ── CHIPS ── */
.chips{display:flex;flex-wrap:wrap;gap:4px}
.chip{background:var(--card2);border:1px solid var(--sep);border-radius:6px;color:var(--text3);cursor:pointer;padding:4px 9px;font-size:10px;font-weight:600;transition:all .14s;-webkit-tap-highlight-color:transparent}
.chip:hover{border-color:var(--accent);color:var(--text)}
.chip.active{border-color:var(--accent);background:var(--acl);color:var(--accent)}

/* ── CAPTION ── */
.cap-textarea{width:100%;background:var(--card2);border:1px solid var(--sep);border-radius:8px;color:var(--text);font-size:12px;padding:8px 10px;resize:none;outline:none;font-family:inherit;margin-bottom:8px;transition:border-color .15s}
.cap-textarea:focus{border-color:var(--accent)}
.cap-textarea::placeholder{color:var(--text3)}
.cap-row{display:flex;align-items:center;gap:6px;margin-bottom:7px}
.cap-label{font-size:10px;color:var(--text2);flex-shrink:0;width:54px}
.cap-color{width:28px;height:22px;border:1px solid var(--sep);border-radius:5px;cursor:pointer;padding:0;background:none;flex-shrink:0}
.fontgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:3px;margin-bottom:8px}
.fontbtn{background:var(--card2);border:1px solid var(--sep);border-radius:6px;color:var(--text3);cursor:pointer;padding:5px 4px;font-size:11px;text-align:center;transition:all .14s;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;-webkit-tap-highlight-color:transparent}
.fontbtn:hover{border-color:var(--accent);color:var(--text)}
.fontbtn.active{border-color:var(--accent);background:var(--acl);color:var(--accent)}
.toggle-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.toggle-lbl{font-size:10px;color:var(--text2)}
.toggle{width:36px;height:20px;background:var(--card3);border-radius:10px;cursor:pointer;border:none;position:relative;transition:background .2s;flex-shrink:0}
.toggle::after{content:'';position:absolute;width:14px;height:14px;border-radius:50%;background:#fff;top:3px;left:3px;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.4)}
.toggle.on{background:var(--accent)}
.toggle.on::after{left:19px;background:var(--surf)}

/* ── ANIMATIONS ── */
.animgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:4px}
.animbtn{background:var(--card2);border:1px solid var(--sep);border-radius:8px;color:var(--text3);cursor:pointer;padding:8px 3px;font-size:9px;font-weight:600;text-align:center;transition:all .14s;display:flex;flex-direction:column;align-items:center;gap:2px;-webkit-tap-highlight-color:transparent}
.animbtn .ai{height:16px;display:flex;align-items:center;justify-content:center}
.animbtn:hover{border-color:var(--accent);color:var(--text)}
.animbtn.active{border-color:var(--accent);background:var(--acl);color:var(--accent)}

/* ── FRAME TYPE ── */
.frame-btns{display:flex;gap:6px;margin-bottom:10px}
.frame-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;padding:10px 4px;background:var(--card2);border:1.5px solid var(--sep);border-radius:10px;cursor:pointer;color:var(--text3);font-size:9px;font-weight:600;transition:all .15s;-webkit-tap-highlight-color:transparent}
.frame-btn:hover{border-color:var(--accent);color:var(--text)}
.frame-btn.active{border-color:var(--accent);background:var(--acl);color:var(--accent)}
.frame-ico{height:26px;display:flex;align-items:center;justify-content:center}

/* ── CANVAS ── */
.cwrap{position:relative;display:flex;align-items:center;justify-content:center}
#preview{display:block;border-radius:8px;box-shadow:0 8px 32px rgba(0,0,0,.14),0 0 0 1px rgba(0,0,0,.06);touch-action:none;user-select:none;-webkit-user-select:none;cursor:default}
.empty-state{display:flex;flex-direction:column;align-items:center;gap:10px;color:var(--text3);text-align:center;padding:20px}
.empty-ico{display:flex;align-items:center;justify-content:center;margin-bottom:4px}
.recindicator{position:absolute;top:10px;right:10px;background:var(--red);color:#fff;border-radius:20px;padding:4px 12px;font-size:11px;font-weight:700;display:none;align-items:center;gap:5px;animation:blnk 1s infinite}
@keyframes blnk{0%,100%{opacity:1}50%{opacity:.5}}
.recdot{width:7px;height:7px;background:#fff;border-radius:50%}
.canvas-hint{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.75);color:#fff;font-size:11px;padding:6px 16px;border-radius:20px;pointer-events:none;white-space:nowrap;opacity:0;transition:opacity .3s;backdrop-filter:blur(10px);z-index:5}
.canvas-hint.vis{opacity:1}

/* ── TOAST ── */
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(14px);background:var(--card);border:1px solid var(--sep);border-radius:12px;padding:9px 18px;font-size:13px;color:var(--text);opacity:0;transition:all .26s;pointer-events:none;z-index:9999;white-space:nowrap;backdrop-filter:blur(20px)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── MOBILE ≤768px ── */
@media(max-width:768px){
  :root{--hdr:46px}
  body{overflow:hidden;height:100%}
  .app{flex-direction:column;overflow:hidden;flex:1;min-height:0}
  .sidebar{display:none}
  .carea{order:1;flex:none;height:42vh;min-height:190px;border-bottom:1px solid var(--sep)}
  .mobile-tab-bar{display:flex;order:2;background:var(--surf);border-top:1px solid var(--sep);overflow-x:auto;flex-shrink:0;scrollbar-width:none;-webkit-overflow-scrolling:touch}
  .mobile-tab-bar::-webkit-scrollbar{display:none}
  .mtab{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;background:none;border:none;color:var(--text3);font-size:9px;font-weight:600;padding:7px 12px;transition:color .14s;border-top:2px solid transparent;-webkit-tap-highlight-color:transparent}
  .mtab .mtab-ico{height:20px;display:flex;align-items:center;justify-content:center}
  .mtab.active{color:var(--accent);border-top-color:var(--accent)}
  .mobile-panel{order:3;flex:1;overflow-y:auto;background:var(--surf);display:flex;flex-direction:column;gap:0;padding:8px;-webkit-overflow-scrolling:touch;min-height:0}
  .hdr{padding:0 10px}
  .logo-text-full{display:none}
  .btn .btn-txt{display:none}
  .toast{bottom:68px}
  .canvas-hint{bottom:8px;font-size:10px}
  .lang-btn{font-size:13px;width:26px;height:22px}
}
@media(min-width:769px){
  .logo-text-short{display:none}
}
</style>
</head>

<!-- ════════ HEADER ════════ -->
<header class="hdr">

<!-- ════════ MAIN APP ════════ -->
<div class="app">

      <p id="empty-p1" style="font-size:14px;font-weight:600">Tölts fel egy képet</p>

    <div class="canvas-hint" id="canvas-hint"></div>

</div>

<div class="mobile-tab-bar" id="m-tabs"></div>
<div class="mobile-panel" id="m-panel"></div>

<div class="toast" id="toast"></div>
<input type="file" id="fileinput" accept="image/*" style="display:none">

// ── Pixel-level adjustments (cross-browser, no ctx.filter dependency) ──
// Applies brightness/contrast/saturation/hue/grayscale/sepia directly on ImageData.
// This works on ALL browsers including old iOS Safari where ctx.filter is unsupported.
function applyPixelAdjustments(oc, a){
  const w=oc.canvas.width, h=oc.canvas.height;
  const needsWork = a.brightness!==100||a.contrast!==100||a.saturation!==100||
                    Math.abs(a.hue)>0.5||a.grayscale>0||a.sepia>0||(a.fade||0)>0;
  if(!needsWork) return;
  const id=oc.getImageData(0,0,w,h); const d=id.data;
  const b=a.brightness/100;
  const co=a.contrast/100;
  const s=a.saturation/100;
  const gs=a.grayscale/100;
  const sp=a.sepia/100;
  // Hue rotation matrix (W3C spec: matrix in RGB space)
  let hm=null;
  if(Math.abs(a.hue)>0.5){
    const hr=a.hue*Math.PI/180, cos=Math.cos(hr), sin=Math.sin(hr);
    hm=[
      0.213+cos*0.787-sin*0.213, 0.715-cos*0.715-sin*0.715, 0.072-cos*0.072+sin*0.928,
      0.213-cos*0.213+sin*0.143, 0.715+cos*0.285+sin*0.140, 0.072-cos*0.072-sin*0.283,
      0.213-cos*0.213-sin*0.787, 0.715-cos*0.715+sin*0.715, 0.072+cos*0.928+sin*0.072,
    ];
  }
  for(let i=0;i<d.length;i+=4){
    let r=d[i], g=d[i+1], bv=d[i+2];
    // brightness (multiply)
    r*=b; g*=b; bv*=b;
    // contrast: (v-128)*c+128
    r=(r-128)*co+128; g=(g-128)*co+128; bv=(bv-128)*co+128;
    // saturation: lerp toward luminance
    if(s!==1){const lm=0.299*r+0.587*g+0.114*bv; r=lm+(r-lm)*s; g=lm+(g-lm)*s; bv=lm+(bv-lm)*s;}
    // hue rotation
    if(hm){const nr=r*hm[0]+g*hm[1]+bv*hm[2],ng=r*hm[3]+g*hm[4]+bv*hm[5],nb=r*hm[6]+g*hm[7]+bv*hm[8]; r=nr;g=ng;bv=nb;}
    // grayscale
    if(gs>0){const gv=0.299*r+0.587*g+0.114*bv; r+=(gv-r)*gs; g+=(gv-g)*gs; bv+=(gv-bv)*gs;}
    // sepia
    if(sp>0){const sr=r*.393+g*.769+bv*.189,sg=r*.349+g*.686+bv*.168,sb=r*.272+g*.534+bv*.131; r+=(sr-r)*sp; g+=(sg-g)*sp; bv+=(sb-bv)*sp;}
    // fade: blend towards neutral gray (180,180,180) — classic faded film look
    if((a.fade||0)>0){const f=(a.fade||0)/100;r=r+(180-r)*f; g=g+(180-g)*f; bv=bv+(180-bv)*f;}
    d[i]=Math.max(0,Math.min(255,r+.5)|0);
    d[i+1]=Math.max(0,Math.min(255,g+.5)|0);
    d[i+2]=Math.max(0,Math.min(255,bv+.5)|0);
  }
  oc.putImageData(id,0,0);
}

// Detect ctx.filter API support: initial value is 'none' when supported, undefined when not
const _ctxFilterOK=(()=>{const t=document.createElement('canvas').getContext('2d');return t.filter==='none';})();

// Apply blur — native ctx.filter where available, pixel box-blur fallback elsewhere
function applyBlur(oc, blurPx){
  if(blurPx<=0.05) return;
  const w=oc.canvas.width, h=oc.canvas.height;
  if(_ctxFilterOK){
    // Fast native path
    const tmp=document.createElement('canvas');tmp.width=w;tmp.height=h;
    const tc=tmp.getContext('2d');
    tc.filter=`blur(${blurPx.toFixed(2)}px)`;
    tc.drawImage(oc.canvas,0,0);
    oc.clearRect(0,0,w,h);oc.drawImage(tmp,0,0);
  } else {
    // Pixel-level two-pass box blur (works on all browsers incl. old iOS Safari)
    const r=Math.max(1,Math.round(blurPx));
    const id=oc.getImageData(0,0,w,h);
    const src=new Uint8ClampedArray(id.data);
    const tmp2=new Uint8ClampedArray(src.length);
    const out=id.data;
    // Pass 1: horizontal
    for(let y=0;y<h;y++){
      for(let x=0;x<w;x++){
        let sR=0,sG=0,sB=0,n=0;
        for(let d=-r;d<=r;d++){const nx=Math.max(0,Math.min(w-1,x+d));const i=(y*w+nx)*4;sR+=src[i];sG+=src[i+1];sB+=src[i+2];n++;}
        const i=(y*w+x)*4;tmp2[i]=sR/n;tmp2[i+1]=sG/n;tmp2[i+2]=sB/n;tmp2[i+3]=src[i+3];
      }
    }
    // Pass 2: vertical
    for(let x=0;x<w;x++){
      for(let y=0;y<h;y++){
        let sR=0,sG=0,sB=0,n=0;
        for(let d=-r;d<=r;d++){const ny=Math.max(0,Math.min(h-1,y+d));const i=(ny*w+x)*4;sR+=tmp2[i];sG+=tmp2[i+1];sB+=tmp2[i+2];n++;}
        const i=(y*w+x)*4;out[i]=sR/n;out[i+1]=sG/n;out[i+2]=sB/n;out[i+3]=tmp2[i+3];
      }
    }
    oc.putImageData(id,0,0);
  }
}

// ── applyAllFiltersToCtx: draw + pixel-level adjustments (no ctx.filter on offscreen canvas) ──
function applyAllFiltersToCtx(oc,sx,sy,sw,sh,w,h){
  // Step 1: draw raw cropped image
  oc.drawImage(origImg,sx,sy,sw,sh,0,0,w,h);

  if(currentFilmFx){
    const fp=FILM_PRESETS.find(f=>f.id===currentFilmFx);
    if(fp){
      const c=fp.css;
      // Combine film preset values × adj fine-tuning
      const combined={
        brightness:(c.brightness/100)*(adj.brightness/100)*100,
        contrast:  (c.contrast  /100)*(adj.contrast  /100)*100,
        saturation:(c.saturation/100)*(adj.saturation/100)*100,
        hue:       (c.hue||0)+adj.hue,
        blur:      (c.blur||0)+adj.blur,
        fade:      adj.fade,
        grayscale: adj.grayscale,
        sepia:     Math.min(100,(c.sepia||0)+adj.sepia),
        vignette:  Math.max(c.vignette||0,adj.vignette)
      };
      // Step 2: pixel adjustments
      applyPixelAdjustments(oc,combined);
      // Step 3: blur (separate pass)
      if(combined.blur>0.05) applyBlur(oc,combined.blur);
      // Step 4: film-specific pixel FX
      applyFilmFx(oc,w,h,fp.fx);
      // Step 5: vignette
      if(combined.vignette>0) drawVignette(oc,w,h,combined.vignette);
    }
  } else {
    // Step 2: pixel adjustments from adj
    applyPixelAdjustments(oc,adj);
    // Step 3: blur
    if(adj.blur>0.05) applyBlur(oc,adj.blur);
    // Step 4: vignette
    if(adj.vignette>0) drawVignette(oc,w,h,adj.vignette);
  }
  if(currentCinematicFx) applyCinematicFx(oc,w,h,currentCinematicFx,cinematicIntensity);
  if(currentBWMode) applyBWFx(oc,w,h,currentBWMode);
}

function getFilteredCanvas(w,h){
  const key=`${w}x${h}|${cropX.toFixed(3)},${cropY.toFixed(3)},${cropZoom.toFixed(3)}|${adj.brightness},${adj.contrast},${adj.saturation},${adj.hue},${adj.blur.toFixed(1)},${adj.fade},${adj.grayscale},${adj.sepia},${adj.vignette}|${currentFilmFx}|${currentCinematicFx}:${cinematicIntensity}|${currentBWMode}|${filterStrength}`;
  if(_fOff&&_fKey===key) return _fOff;
  const{sx,sy,sw,sh}=cropParams(origImg.width,origImg.height,w,h);
  const full=document.createElement('canvas');full.width=w;full.height=h;
  const fc=full.getContext('2d');
  applyAllFiltersToCtx(fc,sx,sy,sw,sh,w,h);
  let result=full;
  if(filterStrength<100){
    const blend=document.createElement('canvas');blend.width=w;blend.height=h;
    const bc=blend.getContext('2d');
    bc.drawImage(origImg,sx,sy,sw,sh,0,0,w,h);
    bc.globalAlpha=filterStrength/100;bc.drawImage(full,0,0);bc.globalAlpha=1;
    result=blend;
  }
  _fOff=result;_fKey=key;return result;
}

// ══════════════════════════════════════════
// GEOMETRY — crop + zoom
// ══════════════════════════════════════════
function arNum(ar){if(ar==='original')return null;const[w,h]=ar.split(':').map(Number);return w/h;}

function canvasSize(){
  if(!origImg) return{w:800,h:600};
  const ca=document.getElementById('carea');
  const maxW=ca.clientWidth*0.92, maxH=ca.clientHeight*0.92;
  const imgAR=origImg.width/origImg.height;

  if(frameType==='polaroid'){
    // Polaroid outer AR: inner image (selected AR or square) + borders
    const innerAR=arNum(currentAR)??1; // default square for polaroid
    // bS = 5.5% of outer width, bB = 20% of outer width, bT = 5.5%
    // innerW = outerW*(1-0.11), innerH = outerH - outerW*0.255
    // innerAR = innerW/innerH => solve for outerW/outerH
    // outerAR = innerAR*(1-0.11) / (1 - innerAR*0.255) -- if innerAR*0.255 < 1
    const outerAR=(innerAR*0.89)/(1+innerAR*0.255);
    let w,h;
    if(outerAR>=1){w=Math.min(maxW,maxH*outerAR);h=w/outerAR;}
    else{h=Math.min(maxH,maxW/outerAR);w=h*outerAR;}
    return{w:Math.round(w),h:Math.round(h)};
  }

  const tAR=arNum(currentAR)??imgAR;
  let w,h;
  if(tAR>=1){w=Math.min(maxW,maxH*tAR);h=w/tAR;}
  else{h=Math.min(maxH,maxW/tAR);w=h*tAR;}
  return{w:Math.round(w),h:Math.round(h)};
}

// cropParams with cropZoom support
function cropParams(imgW,imgH,cW,cH){
  const iAR=imgW/imgH, tAR=cW/cH;
  let sx,sy,sw,sh;
  if(Math.abs(iAR-tAR)<0.002){
    sw=imgW/cropZoom; sh=imgH/cropZoom;
    sx=Math.max(0,Math.min(imgW-sw,(imgW-sw)*cropX));
    sy=Math.max(0,Math.min(imgH-sh,(imgH-sh)*cropY));
    return{sx,sy,sw,sh};
  }
  if(iAR>tAR){
    sh=imgH/cropZoom; sw=sh*tAR;
    sy=Math.max(0,Math.min(imgH-sh,(imgH-sh)*cropY));
    sx=Math.max(0,Math.min(imgW-sw,(imgW-sw)*cropX));
  } else {
    sw=imgW/cropZoom; sh=sw/tAR;
    sx=Math.max(0,Math.min(imgW-sw,(imgW-sw)*cropX));
    sy=Math.max(0,Math.min(imgH-sh,(imgH-sh)*cropY));
  }
  return{sx,sy,sw,sh};
}

function syncZoomUI(){
  document.querySelectorAll('#sl_zoom').forEach(el=>el.value=cropZoom);
  document.querySelectorAll('#sv_zoom').forEach(el=>el.textContent=cropZoom.toFixed(2)+'×');
}

// ══════════════════════════════════════════
// POINTER HANDLING
// ══════════════════════════════════════════
function getClientXY(e){return e.touches?{x:e.touches[0].clientX,y:e.touches[0].clientY}:{x:e.clientX,y:e.clientY};}
function canDrag(){return origImg&&(currentAR!=='original'||cropZoom>1);}

canvas.addEventListener('mousedown',e=>{
  pointerDownPos={x:e.clientX,y:e.clientY};
  if(capPlaceMode) return;
  if(!canDrag()) return;
  isDragging=true;dragLast=getClientXY(e);canvas.style.cursor='grabbing';
});

canvas.addEventListener('touchstart',e=>{
  if(e.touches.length===2){
    pinchDist0=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    pinchZoom0=cropZoom;e.preventDefault();return;
  }
  const t=e.touches[0];pointerDownPos={x:t.clientX,y:t.clientY};
  if(capPlaceMode){e.preventDefault();return;}
  if(!canDrag()) return;
  isDragging=true;dragLast={x:t.clientX,y:t.clientY};
},{passive:false});

canvas.addEventListener('touchmove',e=>{
  if(e.touches.length===2&&pinchDist0>0){
    const nd=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    cropZoom=Math.max(1,Math.min(4,pinchZoom0*(nd/pinchDist0)));
    syncZoomUI();clearFilterCache();
    if(currentAnim==='none') drawFrame(null);
    e.preventDefault();return;
  }
  if(isDragging) e.preventDefault();
  onPointerMove(e);
},{passive:false});

canvas.addEventListener('wheel',e=>{
  e.preventDefault();
  cropZoom=Math.max(1,Math.min(4,cropZoom+(e.deltaY<0?0.08:-0.08)));
  syncZoomUI();clearFilterCache();
  if(currentAnim==='none') drawFrame(null);
},{passive:false});

window.addEventListener('mousemove',onPointerMove);
window.addEventListener('mouseup',e=>handlePointerUp(e,false));
window.addEventListener('touchend',e=>handlePointerUp(e,true));

function handlePointerUp(e,isTouch){
  const pt=isTouch?{x:e.changedTouches[0].clientX,y:e.changedTouches[0].clientY}:{x:e.clientX,y:e.clientY};
  const moved=Math.abs(pt.x-pointerDownPos.x)>8||Math.abs(pt.y-pointerDownPos.y)>8;
  if(capPlaceMode&&!moved){
    const rect=canvas.getBoundingClientRect();
    cap.x=Math.max(1,Math.min(99,(pt.x-rect.left)/rect.width*100));
    cap.y=Math.max(1,Math.min(99,(pt.y-rect.top)/rect.height*100));
    syncCapXY();setCapPlaceMode(false);
    if(currentAnim==='none') drawFrame(null);return;
  }
  endDrag();pinchDist0=0;
}

function onPointerMove(e){
  if(!isDragging||!canDrag()) return;
  const pos=getClientXY(e);
  const dx=pos.x-dragLast.x, dy=pos.y-dragLast.y;
  dragLast=pos;
  const{w,h}=canvasSize();
  const rect=canvas.getBoundingClientRect();
  const scX=canvas.width/(rect.width||canvas.width);
  const scY=canvas.height/(rect.height||canvas.height);
  const cdx=dx*scX, cdy=dy*scY;
  const iAR=origImg.width/origImg.height;
  const tAR=(frameType==='polaroid')?(arNum(currentAR)??1):(arNum(currentAR)??iAR);
  if(iAR>tAR){
    const sw=origImg.height*tAR/cropZoom;const maxOff=origImg.width-sw;
    if(maxOff>0){const imgDx=cdx*(origImg.width/w);cropX=Math.max(0,Math.min(1,cropX-imgDx/maxOff));}
  } else {
    const sh=origImg.width/tAR/cropZoom;const maxOff=origImg.height-sh;
    if(maxOff>0){const imgDy=cdy*(origImg.height/h);cropY=Math.max(0,Math.min(1,cropY-imgDy/maxOff));}
  }
  // Also allow panning when zoomed in (both axes)
  if(cropZoom>1){
    const sw2=origImg.width/cropZoom;const maxX=origImg.width-sw2;
    const sh2=origImg.height/cropZoom;const maxY=origImg.height-sh2;
    if(maxX>0){const imgDx=cdx*(origImg.width/w);cropX=Math.max(0,Math.min(1,cropX-imgDx/maxX));}
    if(maxY>0){const imgDy=cdy*(origImg.height/h);cropY=Math.max(0,Math.min(1,cropY-imgDy/maxY));}
  }
  clearFilterCache();if(currentAnim==='none') drawFrame(null);
}

function endDrag(){isDragging=false;if(!capPlaceMode)canvas.style.cursor=canDrag()?'grab':'default';}

function updateCropCursor(){
  if(capPlaceMode) return;
  canvas.style.cursor=canDrag()?'grab':'default';
  showHint(T('dragCropHint')+' · '+T('zoomHint'),2500);
}

function setCapPlaceMode(on){
  capPlaceMode=on;
  canvas.style.cursor=on?'crosshair':(canDrag()?'grab':'default');
  if(on) showHint(T('clickToPlace'),0);
  else   document.getElementById('canvas-hint').classList.remove('vis');
  document.querySelectorAll('.cap-place-btn').forEach(b=>b.classList.toggle('active-place',on));
}

function syncCapXY(){
  document.querySelectorAll('#cap-x').forEach(el=>el.value=Math.round(cap.x));
  document.querySelectorAll('#cap-x-val').forEach(el=>el.textContent=Math.round(cap.x)+'%');
  document.querySelectorAll('#cap-y').forEach(el=>el.value=Math.round(cap.y));
  document.querySelectorAll('#cap-y-val').forEach(el=>el.textContent=Math.round(cap.y)+'%');
}

let hintTimer;
function showHint(msg,dur){
  const el=document.getElementById('canvas-hint');
  el.textContent=msg;el.classList.add('vis');
  clearTimeout(hintTimer);
  if(dur>0) hintTimer=setTimeout(()=>el.classList.remove('vis'),dur);
}

// ══════════════════════════════════════════
// PIXEL FX
// ══════════════════════════════════════════
const cl=v=>Math.max(0,Math.min(255,Math.round(v)));
const gc=(v,g)=>Math.pow(Math.max(0,v)/255,g)*255;

function applyFilmFx(oc,w,h,fx){
  const id=oc.getImageData(0,0,w,h);const d=id.data;
  for(let i=0;i<d.length;i+=4){
    let r=d[i],g=d[i+1],b=d[i+2];
    const lum=(0.299*r+0.587*g+0.114*b)/255;
    const shadow=Math.max(0,1-lum*2.5);
    const high=Math.max(0,lum*2.5-1.5);
    switch(fx){
      case 'kodachrome': r=cl(gc(r,.82)*1.20+shadow*35-high*8);g=cl(gc(g,.96)*.90+shadow*8);b=cl(gc(b,.88)*.92+shadow*18+high*28);break;
      case 'portra':     r=cl(r*1.10+shadow*22+8);g=cl(g*1.04+shadow*10+4);b=cl(b*.88+shadow*5);break;
      case 'velvia':     r=cl(gc(r,.78)*1.14+shadow*12);g=cl(gc(g,.84)*1.08+shadow*6);b=cl(gc(b,.76)*1.22+shadow*14);break;
      case 'ektachrome': r=cl(r*.90-shadow*12+high*8);g=cl(g*1.02+shadow*6+high*5);b=cl(b*1.22+shadow*8+high*15);break;
      case 'agfa':       r=cl(r*1.14+shadow*25+10);g=cl(g*.97+shadow*12);b=cl(b*.74-shadow*18);break;
      case 'polaroid':   r=cl(r*.94+shadow*12+high*40+6);g=cl(g*1.10+shadow*18+high*22+3);b=cl(b*.80+shadow*28-high*18);break;
      case 'lomo':       r=cl(gc(r,.72)*1.30+shadow*8);g=cl(gc(g,.90)*.85-shadow*5);b=cl(gc(b,.76)*1.20+shadow*12);break;
      case 'diana':      r=cl(r*1.06+shadow*22+10);g=cl(g*1.03+shadow*14+6);b=cl(b*.88+shadow*10);break;
      case 'xpro':       r=cl(r<128?r*1.6:128+(r-128)*.72);g=cl(gc(g,.88)*.82+shadow*10);b=cl(b<128?b*.65+shadow*25:128+(b-128)*1.50);break;
      case 'instant':    r=cl(r*.86+42+shadow*18);g=cl(g*.82+32+shadow*12);b=cl(b*.75+22+shadow*6);break;
    }
    d[i]=r;d[i+1]=g;d[i+2]=b;
  }
  oc.putImageData(id,0,0);
}

function applyBWFx(oc,w,h,mode){
  const id=oc.getImageData(0,0,w,h);const d=id.data;
  for(let i=0;i<d.length;i+=4){
    const r=d[i],g=d[i+1],b=d[i+2];
    let ro,go,bo,gray;
    switch(mode){
      case 'bw_classic':  gray=cl(.299*r+.587*g+.114*b);ro=go=bo=gray;break;
      case 'bw_hicon':    gray=cl(Math.pow((.299*r+.587*g+.114*b)/255,.68)*295);ro=go=bo=gray;break;
      case 'bw_soft':     gray=cl(20+(.299*r+.587*g+.114*b)*.85);ro=go=bo=gray;break;
      case 'bw_infrared': gray=cl((.75*r+.22*g+.03*b)*1.25);ro=go=bo=gray;break;
      case 'bw_silver':  {gray=(.299*r+.587*g+.114*b)/255;ro=cl(gray*255*(1+gray*.05));go=cl(gray*255);bo=cl(gray*255*(1-gray*.07+.02));break;}
      case 'bw_cyan':     gray=.299*r+.587*g+.114*b;ro=cl(gray*.18+16);go=cl(gray*.55+48);bo=cl(gray+88);break;
      case 'bw_solarize': gray=.299*r+.587*g+.114*b;gray=gray>127?255-gray:gray;ro=go=bo=cl(gray);break;
      case 'bw_dramatic': gray=cl(Math.pow((.12*r+.76*g+.12*b)/255,1.4)*320);ro=go=bo=gray;break;
      
      // Master B&W Collection
      case 'bw_leicamc': {
        // Leica Monochrom HC: green-dominant sensor, steep S-curve, micro-contrast
        const lm=0.25*r+0.68*g+0.07*b;
        const n=Math.max(0,lm)/255;
        // Steep S-curve: deep blacks, brilliant whites, punchy mids
        const sc=n<0.25?n*0.55:n<0.6?0.138+(n-0.25)*1.25:0.575+(n-0.6)*1.28;
        const lv=Math.min(255,sc*268);
        ro=cl(lv); go=cl(lv-2); bo=cl(lv-5); // pure cool-neutral black
        break;
      }
      case 'bw_trix400': {
        // Kodak Tri-X 400: classic photojournalism — red-sensitive, organic, wide mids
        const tg=0.36*r+0.54*g+0.10*b;
        const tn=Math.max(0,tg)/255;
        // Organic S-curve: slightly lifted shadows, gentle roll-off in highlights
        const ts=tn<0.15?tn*1.4:tn<0.80?0.21+(tn-0.15)*0.98:0.847+(tn-0.80)*0.77;
        ro=go=bo=cl(Math.min(255,ts*255));
        break;
      }
      case 'bw_ihp5': {
        // Ilford HP5 Plus: Zone System — perfect 10-zone tonal distribution (Ansel Adams)
        const zg=0.28*r+0.60*g+0.12*b;
        const zn=Math.max(0,zg)/255;
        // Near-linear in mids, open shadows, smooth shoulder highlights
        const zv=zn<0.08?zn*1.55:zn<0.92?0.124+(zn-0.08)*0.935:0.961+(zn-0.92)*0.49;
        ro=go=bo=cl(Math.min(255,zv*255));
        break;
      }
      case 'bw_silvgel': {
        // Silver Gelatin Print: selenium toning — warm silver-gray in mids, cool deep blacks
        const sg=0.299*r+0.587*g+0.114*b;
        const sn=Math.max(0,sg)/255;
        const sv=Math.pow(sn,0.92)*252;
        // Selenium: warm (red-brown) in lower midtones, neutral to cool in shadows/highlights
        const selWarm=Math.max(0,sn-0.08)*Math.max(0,0.75-sn)*3.8; // peaks around 0.4
        ro=cl(sv+selWarm*14);
        go=cl(sv+selWarm*6);
        bo=cl(sv-selWarm*8);
        break;
      }
      case 'bw_acros': {
        // Fuji Acros 100: enhanced contrast, slight warm cast in shadows
        const ac=0.30*r+0.59*g+0.11*b;
        const an=Math.max(0,ac)/255;
        const as=an<0.2?an*0.8:an<0.8?0.16+(an-0.2)*1.05:0.8+(an-0.8)*0.92;
        const av=Math.min(255,as*280);
        ro=cl(av+2); go=cl(av); bo=cl(av-3);
        break;
      }

      default: continue;
    }
    d[i]=ro;d[i+1]=go;d[i+2]=bo;
  }
  oc.putImageData(id,0,0);
}

// Adjustment-panel noise: simple per-pixel luminance noise, applied post-cache
// ══════════════════════════════════════════
// LUT ENGINE — 33×33×33 trilinear interpolation
// ══════════════════════════════════════════
const _lutCache={};
function buildLUT(id,transformFn){
  if(_lutCache[id]) return _lutCache[id];
  const S=33,step=255/(S-1);
  const lut=new Uint8Array(S*S*S*3);
  let idx=0;
  for(let bi=0;bi<S;bi++){for(let gi=0;gi<S;gi++){for(let ri=0;ri<S;ri++){
    const rv=Math.round(ri*step),gv=Math.round(gi*step),bv=Math.round(bi*step);
    const [ro,go,bo]=transformFn(rv,gv,bv);
    lut[idx++]=Math.max(0,Math.min(255,ro|0));
    lut[idx++]=Math.max(0,Math.min(255,go|0));
    lut[idx++]=Math.max(0,Math.min(255,bo|0));
  }}}
  return (_lutCache[id]=lut);
}
function applyLUT(oc,w,h,lut){
  const S=33,step=255/(S-1);
  const id=oc.getImageData(0,0,w,h);const d=id.data;
  for(let i=0;i<d.length;i+=4){
    const r=d[i],g=d[i+1],b=d[i+2];
    const rn=r/step,gn=g/step,bn=b/step;
    const r0=Math.floor(rn),r1=Math.min(r0+1,S-1);
    const g0=Math.floor(gn),g1=Math.min(g0+1,S-1);
    const b0=Math.floor(bn),b1=Math.min(b0+1,S-1);
    const rf=rn-r0,gf=gn-g0,bf=bn-b0;
    const ci=(bv,gv,rv)=>(bv*S*S+gv*S+rv)*3;
    for(let ch=0;ch<3;ch++){
      const v000=lut[ci(b0,g0,r0)+ch],v001=lut[ci(b0,g0,r1)+ch];
      const v010=lut[ci(b0,g1,r0)+ch],v011=lut[ci(b0,g1,r1)+ch];
      const v100=lut[ci(b1,g0,r0)+ch],v101=lut[ci(b1,g0,r1)+ch];
      const v110=lut[ci(b1,g1,r0)+ch],v111=lut[ci(b1,g1,r1)+ch];
      const v00=v000*(1-rf)+v001*rf,v01=v010*(1-rf)+v011*rf;
      const v10=v100*(1-rf)+v101*rf,v11=v110*(1-rf)+v111*rf;
      const v0=v00*(1-gf)+v01*gf,v1=v10*(1-gf)+v11*gf;
      d[i+ch]=Math.round(v0*(1-bf)+v1*bf);
    }
  }
  oc.putImageData(id,0,0);
}

// ══════════════════════════════════════════
// CINEMATIC FX — Hollywood-grade color grading
// ══════════════════════════════════════════
function applyCinematicFx(oc,w,h,fx,intensity){
  const t=(intensity||100)/100;
  if(t<=0) return;
  // Use LUT for deterministic per-pixel transforms
  const lut=buildLUT(fx+'_lut',function(r,g,b){
    const lum=(0.299*r+0.587*g+0.114*b)/255;
    const shadow=Math.max(0,1-lum*2.2);       // 1 in blacks → 0 at ~45% lum
    const high=Math.max(0,lum*2.2-1.2);        // 0 at ~55% lum → 1 in whites
    const mid=Math.max(0,1-Math.abs(lum-0.45)*3.5); // peaks ~45% lum
    let ro=r,go=g,bo=b;
    switch(fx){

      // ── Vol I — Hollywood Classics ─────────────────────────────────────
      case 'teal_orange':{
        const isSkin=(r>100&&r>g*1.08&&g>b&&(r-b)>25)?1:0;
        const sk=1-isSkin*0.75;
        ro=Math.round(r-shadow*32*sk+high*28);
        go=Math.round(g+shadow*6*sk+high*10);
        bo=Math.round(b+shadow*32*sk-high*22);
        break;
      }
      case 'grand_pastel':{
        const lift=Math.round(22*(1-lum));
        const warmBoost=(r>g&&r>b)?1.09:1.0;
        const blueReduce=Math.max(0,(b-g)*0.4)|0;
        ro=Math.round(Math.min(255,r*warmBoost))+lift;
        go=Math.round(g*1.02)+lift;
        bo=Math.round(b*0.86-blueReduce)+lift;
        break;
      }
      case 'neo_noir':{
        ro=Math.round(r*(1-shadow*0.45)+high*18);
        go=Math.round(g*(1-shadow*0.28)+high*8);
        bo=Math.round(b*(1+shadow*0.55)+high*4);
        break;
      }
      case 'vision3_500t':{
        const shadowLift=Math.round(Math.max(0,(0.18-lum)*90));
        const hcomp=lum>0.88?((lum-0.88)/0.12*0.12):0;
        ro=Math.round(r*1.05+shadowLift*0.9-hcomp*25);
        go=Math.round(g*0.97+shadowLift*0.5-hcomp*18);
        bo=Math.round(b*0.80+shadowLift*0.3-hcomp*12);
        break;
      }

      // ── Vol II — Cinematic Icons ────────────────────────────────────────
      case 'blade_runner':{
        // Roger Deakins: amber-copper mids, deep teal-blue shadows, compressed warm highs
        const copper=mid*0.55;
        ro=Math.round(r*(1-shadow*0.52)+copper*22+high*14);
        go=Math.round(g*(1-shadow*0.22)+copper*8-high*4);
        bo=Math.round(b*(1+shadow*0.72)-copper*12-high*10);
        break;
      }
      case 'matrix_green':{
        // Ubiquitous green phosphor tint; crushed blacks; cold digital feel
        ro=Math.round(r*0.82-shadow*10);
        go=Math.round(g*1.18+shadow*8+high*12);
        bo=Math.round(b*0.84+shadow*5-high*6);
        break;
      }
      case 'moonlight_blue':{
        // Barry Jenkins: indigo-blue shadows, copper midtones, cool teal highlights
        ro=Math.round(r*(1-shadow*0.65)+mid*18-high*8);
        go=Math.round(g*(1-shadow*0.35)+mid*6+high*2);
        bo=Math.round(b*(1+shadow*0.75)-mid*14+high*12);
        break;
      }
      case 'synthwave':{
        // Drive/vaporwave: hot pink mids, deep cyan-blue shadows, neon contrast
        const pink=mid*0.7;
        ro=Math.round(r*(1-shadow*0.6)+pink*35+high*10);
        go=Math.round(g*(1-shadow*0.4)-pink*10-high*8);
        bo=Math.round(b*(1+shadow*0.55)+pink*15-high*5);
        break;
      }
      case 'la_la_land':{
        // Linus Sandgren: golden-pink highs, airy mids, faint blue shadows
        ro=Math.round(r*1.05+high*18+shadow*(-10)+mid*6);
        go=Math.round(g*0.98+high*(-4)+shadow*(-5)+mid*2);
        bo=Math.round(b*0.82+high*(-22)+shadow*20-mid*8);
        break;
      }

      // ── Vol III — Mood and Texture ──────────────────────────────────────
      case 'golden_hour':{
        // Warm amber sunlight; burning highlights; intimate shadows
        ro=Math.round(r*1.10+high*22+shadow*6);
        go=Math.round(g*1.02+high*6-shadow*4);
        bo=Math.round(b*0.74-high*18-shadow*10);
        break;
      }
      case 'matte_fade':{
        // Lifted blacks; slight cyan shadow; soft compressed highlights
        const floor=shadow*28;
        ro=Math.round(r*0.94+floor*0.82-high*4);
        go=Math.round(g*0.95+floor*1.04-high*2);
        bo=Math.round(b*0.97+floor*1.28-high*1);
        break;
      }
      case 'bleach_bypass':{
        // Silver retention: aggressive contrast S-curve + slight warm high
        const lc=lum<0.5?lum*0.82:0.41+(lum-0.5)*1.18;
        const scale=lc/Math.max(0.001,lum);
        ro=Math.round(r*scale+high*10);
        go=Math.round(g*scale);
        bo=Math.round(b*scale-high*6);
        break;
      }
      case 'cross_process':{
        // E-6 in C-41: shifted channels, boosted saturation, unexpected colour
        const rCurve=lum<0.5?lum*1.15:0.575+(lum-0.5)*0.85;
        const rScale=rCurve/Math.max(0.001,lum);
        ro=Math.round(r*rScale);
        go=Math.round(g*(1-shadow*0.12)+high*24);
        bo=Math.round(b*(1+shadow*0.45)-high*28);
        break;
      }
      case 'her_warm':{
        // Spike Jonze/Hoyte van Hoytema: peach-cream warmth, no cool tones
        ro=Math.round(r*1.08+shadow*10+high*12);
        go=Math.round(g*1.03+shadow*4-high*2);
        bo=Math.round(b*0.75-shadow*12-high*20);
        break;
      }
      case 'parasite_cold':{
        // Bong Joon-ho/Hong Kyung-pyo: clinical blue-green, high-contrast
        ro=Math.round(r*0.87-shadow*12-high*4);
        go=Math.round(g*1.03+shadow*6+high*6);
        bo=Math.round(b*1.14+shadow*18+high*8);
        break;
      }
      case 'euphoria_neon':{
        // Sam Levinson: purple shadows, electric pink mids, cyan highlights
        const neon=mid*0.75;
        ro=Math.round(r*(1+shadow*0.28)+neon*28+high*(-6));
        go=Math.round(g*(1-shadow*0.42)-neon*8+high*10);
        bo=Math.round(b*(1+shadow*0.72)+neon*12+high*18);
        break;
      }
    }
    ro=Math.max(0,Math.min(255,ro));
    go=Math.max(0,Math.min(255,go));
    bo=Math.max(0,Math.min(255,bo));
    return [ro,go,bo];
  });
  // Apply LUT with intensity blend
  if(t>=0.99){applyLUT(oc,w,h,lut);return;}
  const id=oc.getImageData(0,0,w,h);const d=id.data;
  const S=33,step=255/(S-1);
  for(let i=0;i<d.length;i+=4){
    const r=d[i],g=d[i+1],b=d[i+2];
    const rn=r/step,gn=g/step,bn=b/step;
    const r0=Math.floor(rn),r1=Math.min(r0+1,S-1);
    const g0=Math.floor(gn),g1=Math.min(g0+1,S-1);
    const b0=Math.floor(bn),b1=Math.min(b0+1,S-1);
    const rf=rn-r0,gf=gn-g0,bf=bn-b0;
    const ci=(bv,gv,rv)=>(bv*S*S+gv*S+rv)*3;
    for(let ch=0;ch<3;ch++){
      const src=d[i+ch];
      const v000=lut[ci(b0,g0,r0)+ch],v001=lut[ci(b0,g0,r1)+ch];
      const v010=lut[ci(b0,g1,r0)+ch],v011=lut[ci(b0,g1,r1)+ch];
      const v100=lut[ci(b1,g0,r0)+ch],v101=lut[ci(b1,g0,r1)+ch];
      const v110=lut[ci(b1,g1,r0)+ch],v111=lut[ci(b1,g1,r1)+ch];
      const v00=v000*(1-rf)+v001*rf,v01=v010*(1-rf)+v011*rf;
      const v10=v100*(1-rf)+v101*rf,v11=v110*(1-rf)+v111*rf;
      const v0=v00*(1-gf)+v01*gf,v1=v10*(1-gf)+v11*gf;
      const lutVal=v0*(1-bf)+v1*bf;
      d[i+ch]=Math.round(src+(lutVal-src)*t);
    }
  }
  oc.putImageData(id,0,0);
  // Halation: film-realistic light bloom
  if(fx==='vision3_500t') applyHalation(oc,w,h,0.60*t);
  if(fx==='blade_runner')  applyHalation(oc,w,h,0.30*t);
  if(fx==='golden_hour')   applyHalation(oc,w,h,0.45*t);
  if(fx==='her_warm')      applyHalation(oc,w,h,0.20*t);
}

// Halation: reddish glow bleeding from highlights (film characteristic)
function applyHalation(oc,w,h,strength){
  if(strength<=0) return;
  const id=oc.getImageData(0,0,w,h);const d=id.data;
  const thr=195,r2=Math.max(2,Math.round(Math.min(w,h)/120));
  // Build highlight mask
  const mask=new Float32Array(w*h);
  for(let i=0;i<w*h;i++){
    const lum=d[i*4]*0.299+d[i*4+1]*0.587+d[i*4+2]*0.114;
    if(lum>thr) mask[i]=(lum-thr)/(255-thr);
  }
  // One-pass box blur on mask
  const tmp=new Float32Array(w*h);
  for(let y=0;y<h;y++)for(let x=0;x<w;x++){
    let s=0,n=0;
    for(let dy=-r2;dy<=r2;dy++)for(let dx=-r2;dx<=r2;dx++){
      const ny=Math.max(0,Math.min(h-1,y+dy)),nx=Math.max(0,Math.min(w-1,x+dx));
      s+=mask[ny*w+nx];n++;
    }
    tmp[y*w+x]=s/n;
  }
  // Apply warm (reddish-orange) glow
  for(let i=0;i<w*h;i++){
    const glow=tmp[i]*strength*55;
    if(glow<0.5) continue;
    d[i*4]  =Math.min(255,d[i*4]  +glow);
    d[i*4+1]=Math.min(255,d[i*4+1]+glow*0.35);
  }
  oc.putImageData(id,0,0);
}

// Luminance-dependent grain: shadows get more grain than highlights
function applyLumGrain(c,w,h,baseAmount){
  if(baseAmount<=0) return;
  const id=c.getImageData(0,0,w,h);const d=id.data;
  for(let i=0;i<d.length;i+=4){
    const lum=(d[i]*0.299+d[i+1]*0.587+d[i+2]*0.114)/255;
    const strength=baseAmount*(1-lum*0.72);  // shadows: full, highlights: ~28%
    const n=(Math.random()-.5)*strength;
    d[i]  =Math.max(0,Math.min(255,d[i]  +n));
    d[i+1]=Math.max(0,Math.min(255,d[i+1]+n));
    d[i+2]=Math.max(0,Math.min(255,d[i+2]+n));
  }
  c.putImageData(id,0,0);
}

function applyGrain(c,w,h){
  if(grain.amount<=0&&grain.scratch<=0) return;
  const id=c.getImageData(0,0,w,h);const d=id.data;
  const intensity=grain.amount/100*90;
  if(grain.amount>0){
    const size=grain.type==='fine'?1:grain.type==='medium'?2:grain.type==='color'?1:3;
    for(let y=0;y<h;y+=size){for(let x=0;x<w;x+=size){
      const noise=(Math.random()-.5)*intensity;
      for(let dy=0;dy<size&&y+dy<h;dy++){for(let dx=0;dx<size&&x+dx<w;dx++){
        const idx=((y+dy)*w+(x+dx))*4;
        if(grain.type==='color'){
          d[idx]=Math.max(0,Math.min(255,d[idx]+(Math.random()-.5)*intensity));
          d[idx+1]=Math.max(0,Math.min(255,d[idx+1]+(Math.random()-.5)*intensity));
          d[idx+2]=Math.max(0,Math.min(255,d[idx+2]+(Math.random()-.5)*intensity));
        } else {
          d[idx]=Math.max(0,Math.min(255,d[idx]+noise));
          d[idx+1]=Math.max(0,Math.min(255,d[idx+1]+noise));
          d[idx+2]=Math.max(0,Math.min(255,d[idx+2]+noise));
        }
      }}
    }}
  }
  if(grain.scratch>0){
    const num=Math.floor(grain.scratch/100*30);
    for(let n=0;n<num;n++){
      const x=Math.floor(Math.random()*w),len=Math.floor(Math.random()*h*.3+h*.1);
      const yS=Math.floor(Math.random()*(h-len));const dark=Math.random()>.5;
      for(let dy=0;dy<len;dy++){
        const idx=((yS+dy)*w+x)*4;
        const v=dark?Math.max(0,d[idx]-140):Math.min(255,d[idx]+120);
        d[idx]=d[idx+1]=d[idx+2]=v;
      }
    }
  }
  c.putImageData(id,0,0);
}

function drawVignette(c,w,h,s){
  const g=c.createRadialGradient(w/2,h/2,0,w/2,h/2,Math.max(w,h)*.72);
  const a=(s/100)*.92;
  g.addColorStop(0,'rgba(0,0,0,0)');g.addColorStop(.45,'rgba(0,0,0,0)');g.addColorStop(1,`rgba(0,0,0,${a})`);
  c.fillStyle=g;c.fillRect(0,0,w,h);
}

function drawCaption(c,w,h){
  if(!cap.text.trim()) return;
  const fm=FONTS.find(f=>f.id===cap.font)?.css||'Arial, sans-serif';
  const sz=Math.round(cap.size*(Math.min(w,h)/400));
  c.save();c.font=`bold ${sz}px ${fm}`;c.textAlign='center';c.textBaseline='middle';
  c.globalAlpha=cap.opacity/100;
  const px=w*cap.x/100, py=h*cap.y/100;
  const lines=cap.text.split('\n'), lh=sz*1.28, totalH=(lines.length-1)*lh;
  if(cap.bgBar){
    let maxW=0;lines.forEach(ln=>{const m=c.measureText(ln);if(m.width>maxW)maxW=m.width;});
    c.fillStyle='rgba(0,0,0,0.55)';
    c.fillRect(px-maxW/2-sz*.6,py-totalH/2-sz*.6,maxW+sz*1.2,lines.length*lh+sz*.4);
  }
  if(cap.shadow){c.shadowColor='rgba(0,0,0,0.9)';c.shadowBlur=sz*.28;c.shadowOffsetX=1;c.shadowOffsetY=1;}
  c.fillStyle=cap.color;
  lines.forEach((ln,i)=>{c.fillText(ln,px,py-totalH/2+i*lh);});
  c.restore();
}

// ══════════════════════════════════════════
// ANIMATION TRANSFORMS
// ══════════════════════════════════════════
function animTransform(id,el,w,h){
  const T2=el*animSpd;
  switch(id){
    case 'kenburns':{const z=1+.18*(.5+.5*Math.sin(T2*.5));const px=w*(z-1)*(.35+.3*Math.sin(T2*.31));const py=h*(z-1)*(.35+.3*Math.cos(T2*.27));return{sx:z,sy:z,tx:-px/2,ty:-py/2,al:1,rot:0};}
    case 'fadein':   return{sx:1,sy:1,tx:0,ty:0,al:Math.max(.08,.5+.5*Math.sin(T2*1.1)),rot:0};
    case 'pulse':   {const s=1+.06*Math.sin(T2*2.2);return{sx:s,sy:s,tx:0,ty:0,al:1,rot:0};}
    case 'slideL':   return{sx:1.08,sy:1.08,tx:-w*.07*Math.sin(T2*.9),ty:0,al:1,rot:0};
    case 'rotate':   return{sx:1,sy:1,tx:0,ty:0,al:1,rot:(T2*25)%360};
    case 'shake':    return{sx:1,sy:1,tx:Math.sin(T2*22)*7,ty:Math.cos(T2*18)*5,al:1,rot:0};
    case 'zoom':    {const s2=1+.22*(.5+.5*Math.sin(T2*1.4));return{sx:s2,sy:s2,tx:0,ty:0,al:1,rot:0};}
    case 'swing':    return{sx:1,sy:1,tx:0,ty:0,al:1,rot:4*Math.sin(T2*1.6)};
    default:         return{sx:1,sy:1,tx:0,ty:0,al:1,rot:0};
  }
}

// ══════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════
function drawFrame(ts){
  if(!origImg) return;
  const{w,h}=canvasSize();
  if(canvas.width!==w) canvas.width=w;
  if(canvas.height!==h) canvas.height=h;
  ctx.clearRect(0,0,w,h);
  const el=(animT0&&ts)?(ts-animT0)/1000:0;
  const tf=animTransform(currentAnim,el,w,h);

  if(frameType==='polaroid'){
    // Calculate inner dimensions
    const bS=Math.round(w*.055);
    const bB=Math.round(w*.20);
    const bT=Math.round(w*.055);
    const iW=w-bS*2;
    const iH=h-bT-bB;

    // Polaroid background (customizable color)
    ctx.fillStyle=polaroidColor;
    ctx.beginPath();
    ctx.roundRect(0,0,w,h,4);
    ctx.fill();
    // Slight shadow inside for depth
    const innerShadow=ctx.createLinearGradient(bS,bT,bS,bT+iH);
    innerShadow.addColorStop(0,'rgba(0,0,0,.08)');innerShadow.addColorStop(.05,'rgba(0,0,0,0)');
    innerShadow.addColorStop(1,'rgba(0,0,0,0)');

    // Get the filtered image at inner frame dimensions
    const filtered=getFilteredCanvas(iW,iH);

    // Clip to inner frame rectangle and draw image with animation
    ctx.save();
    ctx.beginPath();
    ctx.rect(bS,bT,iW,iH);
    ctx.clip();
    ctx.globalAlpha=tf.al;
    ctx.translate(bS+iW/2+tf.tx,bT+iH/2+tf.ty);
    ctx.scale(tf.sx,tf.sy);
    if(tf.rot!==0) ctx.rotate(tf.rot*Math.PI/180);
    ctx.drawImage(filtered,-iW/2,-iH/2,iW,iH);
    ctx.restore();
    ctx.globalAlpha=1;

    // Polaroid border line
    ctx.strokeStyle='rgba(0,0,0,.06)';ctx.lineWidth=1;
    ctx.strokeRect(bS,bT,iW,iH);
  } else {
    const filtered=getFilteredCanvas(w,h);
    ctx.save();
    ctx.globalAlpha=tf.al;
    ctx.translate(w/2+tf.tx,h/2+tf.ty);
    ctx.scale(tf.sx,tf.sy);
    if(tf.rot!==0) ctx.rotate(tf.rot*Math.PI/180);
    ctx.drawImage(filtered,-w/2,-h/2,w,h);
    ctx.restore();
    ctx.globalAlpha=1;
  }

  if(grain.amount>0||grain.scratch>0) applyGrain(ctx,w,h);
  if(currentBWMode){const bwp=BW_PRESETS.find(p=>p.id===currentBWMode);if(bwp&&bwp.grain>0)applyLumGrain(ctx,w,h,bwp.grain*42);}
  drawCaption(ctx,w,h);
}

function animLoop(ts){if(!animT0)animT0=ts;drawFrame(ts);if(currentAnim!=='none'&&origImg)animId=requestAnimationFrame(animLoop);}

function restartLoop(){
  if(animId){cancelAnimationFrame(animId);animId=null;}
  animT0=null;clearFilterCache();
  if(!origImg) return;
  if(currentAnim!=='none') animId=requestAnimationFrame(animLoop);
  else drawFrame(null);
}

function draw(){if(!origImg) return;clearFilterCache();if(currentAnim==='none')drawFrame(null);}

// ══════════════════════════════════════════
// PRESET THUMBNAILS
// ══════════════════════════════════════════
function renderPresetThumbs(){
  if(!origImg) return;
  const iAR=origImg.width/origImg.height;
  let tsx,tsy,tsw,tsh;
  if(iAR>1){tsw=tsh=origImg.height;tsx=(origImg.width-tsw)/2;tsy=0;}
  else{tsw=tsh=origImg.width;tsx=0;tsy=(origImg.height-tsh)/2;}
  // Use querySelectorAll so both desktop AND mobile canvases get rendered
  function drawInto(id, drawFn){
    document.querySelectorAll(`[data-pc-id="${id}"]`).forEach(c=>{
      c.width=46;c.height=46;
      const pc=c.getContext('2d');
      drawFn(pc);
    });
  }
  PRESETS.forEach(p=>{
    drawInto(p.id, pc=>{
      pc.drawImage(origImg,tsx,tsy,tsw,tsh,0,0,46,46);
      applyPixelAdjustments(pc,p.s);
      if(p.cfx) applyCinematicFx(pc,46,46,p.cfx,100);
      if(p.s.vignette>0) drawVignette(pc,46,46,p.s.vignette);
    });
  });
  FILM_PRESETS.forEach(p=>{
    drawInto(p.id, pc=>{
      pc.drawImage(origImg,tsx,tsy,tsw,tsh,0,0,46,46);
      applyPixelAdjustments(pc,{brightness:p.css.brightness,contrast:p.css.contrast,
        saturation:p.css.saturation,hue:p.css.hue||0,grayscale:0,sepia:p.css.sepia||0,blur:0,vignette:0});
      applyFilmFx(pc,46,46,p.fx);
      if((p.css.vignette||0)>0) drawVignette(pc,46,46,p.css.vignette);
    });
  });
  BW_PRESETS.forEach(p=>{
    drawInto(p.id, pc=>{
      pc.drawImage(origImg,tsx,tsy,tsw,tsh,0,0,46,46);
      applyBWFx(pc,46,46,p.id);
    });
  });
}

function mkSec(title,container){
  const sec=document.createElement('div');sec.className='sec';
  if(title){const t=document.createElement('div');t.className='stitle';t.textContent=title;sec.appendChild(t);}
  if(container) container.appendChild(sec);
  return sec;
}

function fmtVal(k,v){
  if(k==='hue') return(v>0?'+':'')+v+'°';
  if(k==='blur') return v.toFixed(1)+'px';
  return Math.round(v)+'%';
}

function syncSliders(){
  SLIDERS.forEach(s=>{
    document.querySelectorAll(`#sl_${s.k}`).forEach(el=>el.value=adj[s.k]);
    document.querySelectorAll(`#sv_${s.k}`).forEach(el=>el.textContent=fmtVal(s.k,adj[s.k]));
  });
}

function updAllPresetBtns(){
  document.querySelectorAll('.pbtn').forEach(b=>{
    b.classList.toggle('active',b.dataset.preset===currentPreset||b.dataset.preset===currentFilmFx||b.dataset.preset===currentBWMode||b.dataset.preset===currentCinematicFx);
  });
}

function resetAdj(){
  SLIDERS.forEach(s=>{adj[s.k]=s.def;});
  currentPreset='normal';currentFilmFx=null;currentBWMode=null;currentCinematicFx=null;cinematicIntensity=100;
  filterStrength=100;
  document.querySelectorAll('#sl_strength').forEach(el=>el.value=100);
  document.querySelectorAll('#sv_strength').forEach(el=>el.textContent='100%');

function mkToggle(initialOn,cb){
  const el=document.createElement('button');el.className='toggle'+(initialOn?' on':'');

}

function buildPanel(tabId, container){
  container.innerHTML='';
  switch(tabId){
    case 'image':   buildPanel_Image(container);   break;
    case 'filters': buildPanel_Filters(container); break;
    case 'adjust':  buildPanel_Adjust(container);  break;
    case 'frame':   buildPanel_Frame(container);   break;
    case 'text':    buildPanel_Text(container);    break;
    case 'motion':  buildPanel_Motion(container);  break;
  }
}

function switchTab(id){
  activeTab=id;
  document.querySelectorAll('[data-tab]').forEach(btn=>btn.classList.toggle('active',btn.dataset.tab===id));
  const dp=document.getElementById('d-panel');
  const mp=document.getElementById('m-panel');
  if(dp) buildPanel(id,dp);
  if(mp) buildPanel(id,mp);
}

function buildTabBars(){
  ['d-tabs','m-tabs'].forEach(barId=>{
    const bar=document.getElementById(barId);if(!bar) return;
    bar.innerHTML='';
    TABS.forEach(t=>{
      const btn=document.createElement('button');
      btn.className=(barId==='d-tabs'?'stab':'mtab')+(t.id===activeTab?' active':'');
      btn.dataset.tab=t.id;
      if(barId==='d-tabs'){
        btn.innerHTML=`<span class="stab-ico">${t.ico}</span>${T(t.icoKey)}`;
      } else {
        btn.innerHTML=`<span class="mtab-ico">${t.ico}</span>${T(t.icoKey)}`;
      }
      btn.addEventListener('click',()=>switchTab(t.id));
      bar.appendChild(btn);
    });
  });
}

// ══════════════════════════════════════════
// UPLOAD
// ══════════════════════════════════════════
let _thumbSrc=null, _imgMetaStr='';

document.addEventListener('dragover',e=>e.preventDefault());
document.getElementById('carea').addEventListener('dragover',e=>e.preventDefault());
document.getElementById('carea').addEventListener('drop',e=>{
  e.preventDefault();const f=e.dataTransfer?.files[0];
  if(f&&f.type.startsWith('image/')) loadImg(f);
});
document.getElementById('fileinput').addEventListener('change',e=>{if(e.target.files[0])loadImg(e.target.files[0]);e.target.value='';});

function loadImg(file){
  const url=URL.createObjectURL(file);
  const img=new Image();
  img.onload=()=>{
    origImg=img;cropX=0.5;cropY=0.5;cropZoom=1.0;clearFilterCache();
    _thumbSrc=url;_imgMetaStr=`${img.width}×${img.height}px · ${(file.size/1024).toFixed(0)}KB`;
    document.getElementById('emptystate').style.display='none';
    document.getElementById('cwrap').style.display='flex';
    document.getElementById('btnDL').disabled=false;
    document.getElementById('btnRec').disabled=false;
    syncZoomUI();
    renderPresetThumbs();restartLoop();updateCropCursor();
    // Refresh panel if on image tab
    switchTab(activeTab);
  };
  img.onerror=()=>toast(T('loadError'));
  img.src=url;
}

// ══════════════════════════════════════════
// DOWNLOAD / RECORD
// ══════════════════════════════════════════
document.getElementById('btnDL').addEventListener('click',downloadHD);
document.getElementById('btnRec').addEventListener('click',toggleRec);

function downloadHD(){
  if(!origImg) return;
  const tAR=(frameType==='polaroid')?(arNum(currentAR)??1):(arNum(currentAR)??(origImg.width/origImg.height));
  let outW,outH;

  if(frameType==='polaroid'){
    // Calculate outer polaroid dimensions based on inner image size
    const maxInner=Math.min(Math.max(origImg.width,origImg.height),3000);
    const iW=tAR>=1?maxInner:Math.round(maxInner*tAR);
    const iH=tAR>=1?Math.round(maxInner/tAR):maxInner;
    const bS=Math.round(iW*.0618);const bB=Math.round(iW*.225);
    outW=iW+bS*2;outH=iH+bS+bB;

    const off=document.createElement('canvas');off.width=outW;off.height=outH;
    const oc=off.getContext('2d');

    // Polaroid background (customizable color)
    oc.fillStyle=polaroidColor;oc.fillRect(0,0,outW,outH);

    // Render filtered image
    const{sx,sy,sw,sh}=cropParams(origImg.width,origImg.height,iW,iH);
    const filtCanvas=document.createElement('canvas');filtCanvas.width=iW;filtCanvas.height=iH;
    const fc=filtCanvas.getContext('2d');
    applyAllFiltersToCtx(fc,sx,sy,sw,sh,iW,iH);
    let imgCanvas=filtCanvas;
    if(filterStrength<100){
      const bl=document.createElement('canvas');bl.width=iW;bl.height=iH;
      const bc=bl.getContext('2d');
      bc.drawImage(origImg,sx,sy,sw,sh,0,0,iW,iH);bc.globalAlpha=filterStrength/100;bc.drawImage(filtCanvas,0,0);bc.globalAlpha=1;
      imgCanvas=bl;
    }
    oc.drawImage(imgCanvas,bS,bS,iW,iH);
    if(grain.amount>0||grain.scratch>0) applyGrain(oc,outW,outH);
        if(currentBWMode){const bwp=BW_PRESETS.find(p=>p.id===currentBWMode);if(bwp&&bwp.grain>0)applyLumGrain(oc,outW,outH,bwp.grain*42);}
    drawCaption(oc,outW,outH);
    off.toBlob(async blob=>{await dlBlob(blob,'VIPACH_polaroid_'+Date.now()+'.jpg');toast(T('downloadDone')+` (${outW}×${outH}px)`);});
    return;
  }

  const maxSide=Math.min(Math.max(origImg.width,origImg.height),4096);
  if(tAR>=1){outW=maxSide;outH=Math.round(maxSide/tAR);}
  else{outH=maxSide;outW=Math.round(maxSide*tAR);}
  const{sx,sy,sw,sh}=cropParams(origImg.width,origImg.height,outW,outH);
  const filtCanvas=document.createElement('canvas');filtCanvas.width=outW;filtCanvas.height=outH;
  const fc=filtCanvas.getContext('2d');applyAllFiltersToCtx(fc,sx,sy,sw,sh,outW,outH);
  const off=document.createElement('canvas');off.width=outW;off.height=outH;
  const oc=off.getContext('2d');
  if(filterStrength<100){oc.drawImage(origImg,sx,sy,sw,sh,0,0,outW,outH);oc.globalAlpha=filterStrength/100;oc.drawImage(filtCanvas,0,0);oc.globalAlpha=1;}
  else{oc.drawImage(filtCanvas,0,0);}
  if(grain.amount>0||grain.scratch>0) applyGrain(oc,outW,outH);
    if(currentBWMode){const bwp=BW_PRESETS.find(p=>p.id===currentBWMode);if(bwp&&bwp.grain>0)applyLumGrain(oc,outW,outH,bwp.grain*42);}
  drawCaption(oc,outW,outH);
  off.toBlob(async blob=>{await dlBlob(blob,'VIPACH_'+Date.now()+'.jpg');toast(T('downloadDone')+` (${outW}×${outH}px)`);});
}

async function dlBlob(blob,name){
  // Web Share API: lets iOS save directly to Photos/Files
  if(navigator.share&&navigator.canShare){
    const file=new File([blob],name,{type:blob.type||'image/jpeg'});
    try{
      if(navigator.canShare({files:[file]})){
        await navigator.share({files:[file],title:'VIPACH Photo'});
        return;
      }
    }catch(e){ /* user cancelled or share failed — fall through */ }
  }
  // Standard download (desktop + Android)
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=name;
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url),1000);
}

function toggleRec(){if(recording)stopRec();else startRec();}
function startRec(){
  if(!origImg) return;
  if(currentAnim==='none'){toast(T('recNeedAnim'));return;}
  try{
    const stream=canvas.captureStream(30);recChunks=[];
    const mime=MediaRecorder.isTypeSupported('video/webm;codecs=vp9')?'video/webm;codecs=vp9':'video/webm';
    recorder=new MediaRecorder(stream,{mimeType:mime,videoBitsPerSecond:8000000});
    recorder.ondataavailable=e=>{if(e.data.size>0)recChunks.push(e.data);};
    recorder.onstop=()=>{
      const blob=new Blob(recChunks,{type:'video/webm'});dlBlob(blob,'VIPACH_anim_'+Date.now()+'.webm');
      toast(T('recDone'));
    };
    recorder.start(100);recording=true;
    document.getElementById('recindicator').style.display='flex';
    const btn=document.getElementById('btnRec');btn.className='btn btn-red';btn.innerHTML='⏹ <span class="btn-txt" id="btnRecTxt">Stop</span>';
    toast(T('recordStart'));setTimeout(()=>{if(recording)stopRec();},5000);
  }catch(e){toast(T('recError'));}
}
function stopRec(){
  if(!recording||!recorder) return;recorder.stop();recording=false;
  document.getElementById('recindicator').style.display='none';
  const btn=document.getElementById('btnRec');btn.className='btn btn-sec';
  btn.innerHTML=`<svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.4"><circle cx="7" cy="7" r="6"/><circle cx="7" cy="7" r="2.8" fill="currentColor" stroke="none"/></svg> <span class="btn-txt" id="btnRecTxt">${T('record')}</span>`;
}

// ══════════════════════════════════════════
// TOAST & RESIZE
// ══════════════════════════════════════════
let toastTmr;
function toast(msg){
  const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');
  clearTimeout(toastTmr);toastTmr=setTimeout(()=>el.classList.remove('show'),3200);
}
window.addEventListener('resize',()=>{clearFilterCache();if(origImg&&currentAnim==='none')drawFrame(null);});

buildTabBars();
switchTab('image');
</script>
